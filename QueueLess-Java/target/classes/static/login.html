<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QueueLess</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css?v=1.4">
    <style>
        body { margin: 0; min-height: 100vh; display: flex; flex-direction: column; background: var(--bg-main); overflow-x: hidden; }
        .split-layout {
            display: flex;
            min-height: 100vh;
        }
        .split-left {
            flex: 1;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.8), rgba(79, 70, 229, 0.9)), url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4rem;
            color: white;
            position: relative;
        }
        .split-left::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, var(--bg-main) 0%, transparent 100%);
            opacity: 0.1;
        }
        .split-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: var(--bg-main);
        }
        .auth-container {
            width: 100%;
            max-width: 440px;
        }
        .auth-card {
            border: none;
            box-shadow: none;
            background: transparent;
            padding: 0;
        }
        @media(max-width: 992px) {
            .split-left { display: none; }
        }
    </style>
</head>
<body>
    <div class="split-layout fade-up">
        <div class="split-left">
            <a href="index.html" class="logo" style="color: white; position: relative; z-index: 10;">⏱️ Queue<span style="color: white;">Less</span></a>
            <div style="position: relative; z-index: 10;">
                <h1 style="color: white; font-size: 3.5rem; line-height: 1.1; margin-bottom: 1.5rem;">Time is your most valuable asset.</h1>
                <p style="font-size: 1.25rem; opacity: 0.9; max-width: 480px;">Log in to securely manage your automated waiting experience. Reclaim your hours and step out of line entirely.</p>
            </div>
            <div style="position: relative; z-index: 10; font-size: 0.9rem; opacity: 0.7;">
                &copy; 2026 QueueLess Inc.
            </div>
        </div>

        <div class="split-right">
            <div class="auth-container">
                <div class="card auth-card">
                    <h2 class="text-center mb-1">Welcome Back</h2>
                    <p class="text-center text-muted mb-4">Please log in to your account</p>
                    
                    <div id="error-msg" class="alert alert-error hidden"></div>
                    
                    <form id="login-form">
                        <div class="form-group">
                            <label class="form-label" for="email">Email</label>
                            <input type="email" id="email" class="form-control" required placeholder="you@example.com">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="password">Password</label>
                            <input type="password" id="password" class="form-control" required placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn btn-primary pulse-btn" style="width: 100%; margin-top: 1rem; padding: 0.8rem; font-size: 1rem;">Log In</button>
                    </form>
                    
                    <p class="text-center mt-4 text-muted">
                        Don't have an account? <a href="register.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign up for free</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const errorDiv = document.getElementById('error-msg');
            
            btn.textContent = 'Logging in...';
            btn.disabled = true;
            errorDiv.classList.add('hidden');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await apiCall('login', 'POST', { email, password });
                
                if (res.status === 'success') {
                    localStorage.setItem('user', JSON.stringify(res.user));
                    
                    // Redirect based on role
                    if (res.user.role === 'customer') window.location.href = 'user_dashboard.html';
                    else if (res.user.role === 'business') window.location.href = 'business_dashboard.html';
                    else if (res.user.role === 'admin') window.location.href = 'admin_dashboard.html';
                } else {
                    errorDiv.textContent = res.message;
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'An error occurred. Please try again.';
                errorDiv.classList.remove('hidden');
            } finally {
                btn.textContent = 'Log In';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
